# GameHub icon image reverse proxy
# ---------------------------------
# Serves game icons from this site's own domain instead of hotlinking the CDN.
#
#   https://<this-site>/img/<path>   ->   https://img.poki-cdn.com/<path>
#
# Must match the engine's "Icon image proxy" settings:
#   CDN host   = img.poki-cdn.com   (the proxied upstream below)
#   Local path = img                (the /img/ prefix below)
# If you change either in WP settings, update this file to match.
#
# Deploy (Webinoly): copy to  /var/www/<domain>/img-nginx.conf
# It is auto-included by the site's server block (include /var/www/<domain>/*-nginx.conf).
# Then:  nginx -t && systemctl reload nginx
#
# `^~` gives this prefix priority so requests never reach PHP/WordPress.

location ^~ /img/ {
    # Trailing slash on proxy_pass strips the "/img/" prefix and forwards the rest.
    proxy_pass https://img.poki-cdn.com/;

    proxy_ssl_server_name on;
    proxy_set_header Host img.poki-cdn.com;
    proxy_set_header Referer "https://poki.com/";
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header Accept-Encoding "";
    proxy_http_version 1.1;

    # Let this domain's own cache headers win.
    proxy_hide_header Set-Cookie;
    proxy_hide_header Content-Security-Policy;
    proxy_hide_header Cross-Origin-Resource-Policy;
    proxy_ignore_headers Set-Cookie Cache-Control Expires;

    add_header Access-Control-Allow-Origin "*" always;
    add_header Cache-Control "public, max-age=2592000, immutable" always;
    expires 30d;

    # Resolve the CDN and tolerate upstream hiccups.
    resolver 1.1.1.1 1.0.0.1 ipv6=off valid=300s;
    proxy_connect_timeout 5s;
    proxy_read_timeout 20s;
    proxy_intercept_errors off;

    # --- Optional on-disk micro-cache (uncomment + add the http-level line below) ---
    # proxy_cache gamehub_img;
    # proxy_cache_valid 200 302 30d;
    # proxy_cache_valid 404 1m;
    # add_header X-Cache-Status $upstream_cache_status always;
}

# For the optional cache above, add ONCE at http{} level (e.g. /etc/nginx/conf.d/):
#   proxy_cache_path /var/cache/nginx/gamehub_img levels=1:2 keys_zone=gamehub_img:10m max_size=2g inactive=30d use_temp_path=off;
